services:
  postgres:
    container_name: greetingco-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: greetingco_dev
      POSTGRES_DB: greetingco
    ports:
      - "5455:5432"        # custom host port 5455 → container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greetingco-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    container_name: greetingco-adminer
    image: adminer:latest
    ports:
      - "8088:8080"        # DB viewer at http://localhost:8088
    environment:
      ADMINER_DEFAULT_SERVER: greetingco-postgres
      ADMINER_DESIGN: dracula   # dark theme
    networks:
      - greetingco-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  greetingco-net:
    driver: bridge

volumes:
  postgres_data:
